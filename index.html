/* Navbar */
.navbar {

.card {

}

.card:hover {

/* Hero */
.hero {

    padding: 40px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-3">

    <a href="dashboard.html" class="text-white me-3">Dashboard</a>

</div>
