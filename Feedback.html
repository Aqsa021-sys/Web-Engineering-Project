<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #eef2ff;
}
</style>
</head>

<body>

<div class="container mt-4 col-md-6">

<div class="card p-4">

<h3>💬 Feedback</h3>

<input id="name" class="form-control mb-2" placeholder="Name">
<textarea id="comment" class="form-control mb-2" placeholder="Comment"></textarea>

<select id="rating" class="form-control mb-3">
<option value="">Rating</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<button class="btn btn-primary w-100" onclick="submit()">Submit</button>

</div>

</div>

<script>
function submit(){

let n=document.getElementById("name").value;
let c=document.getElementById("comment").value;
let r=document.getElementById("rating").value;

if(n==""||c==""||r==""){
alert("Fill all fields");
return;
}

alert("Feedback submitted successfully!");
}
</script>

</body>
</html>
