<!DOCTYPE html>
<html>
<head>
<title>Courses</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #eef2ff;
}
</style>
</head>

<body>

<div class="container mt-4">

<h3>📚 Select Courses</h3>

<div class="card p-3">

<input type="checkbox" value="Web Dev"> 📘 Web Development <br>
<input type="checkbox" value="AI"> 🤖 Artificial Intelligence <br>
<input type="checkbox" value="DB"> 🗄️ Database Systems <br>
<input type="checkbox" value="Mobile"> 📱 Mobile App Development <br>

<button class="btn btn-success mt-3" onclick="submitCourses()">Submit</button>

</div>

<br>
<a href="dashboard.html">⬅ Back</a>

</div>

<script>
function submitCourses(){

let selected = [];
let boxes = document.querySelectorAll("input[type=checkbox]");

boxes.forEach(b=>{
if(b.checked){
selected.push(b.value);
}
});

alert("Selected Courses: " + selected.join(", "));
}
</script>

</body>
</html>
